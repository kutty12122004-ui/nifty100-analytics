<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Analysis - Nifty 100 Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-indigo-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">📊 Nifty 100 Analytics</h1>
            <div class="space-x-6">
                <a href="/" class="hover:underline">Dashboard</a>
                <a href="/companies/" class="hover:underline">Companies</a>
                <a href="/sector-analysis/" class="hover:underline font-bold">Sectors</a>
                <a href="/top-performers/" class="hover:underline">Top Performers</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto p-8">
        <h2 class="text-3xl font-bold mb-4">Sector Analysis</h2>
        <p class="text-gray-600 mb-8">Performance across different sectors</p>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for sector in sectors %}
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h3 class="text-xl font-bold mb-2 text-indigo-600">
                    {% if sector.sector %}{{ sector.sector }}{% else %}Not Categorized{% endif %}
                </h3>
                <p class="text-3xl font-bold text-gray-800">{{ sector.count }}</p>
                <p class="text-gray-500">Companies</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
