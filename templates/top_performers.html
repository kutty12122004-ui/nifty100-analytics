<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Performers - Nifty 100 Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-indigo-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">📊 Nifty 100 Analytics</h1>
            <div class="space-x-6">
                <a href="/" class="hover:underline">Dashboard</a>
                <a href="/companies/" class="hover:underline">Companies</a>
                <a href="/sector-analysis/" class="hover:underline">Sectors</a>
                <a href="/top-performers/" class="hover:underline font-bold">Top Performers</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto p-8">
        <h2 class="text-3xl font-bold mb-4">Top Performers</h2>
        <p class="text-gray-600 mb-8">Highest valued companies by book value</p>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rank</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Symbol</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Company Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Book Value</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for company in companies %}
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">{{ forloop.counter }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-indigo-600">{{ company.symbol }}</td>
                        <td class="px-6 py-4 text-sm text-gray-900">{{ company.company_name }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-green-600 font-semibold">₹{{ company.book_value }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
