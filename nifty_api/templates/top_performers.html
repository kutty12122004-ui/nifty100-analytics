{% extends 'base.html' %}

{% block title %}Top Performers - Nifty 100 Analytics{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Top Performers</h1>
    <p class="text-gray-600 mb-6">Best performing Nifty 100 companies by Net Profit</p>
    
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-2 text-left">Rank</th>
                    <th class="px-4 py-2 text-left">Symbol</th>
                    <th class="px-4 py-2 text-left">Company</th>
                    <th class="px-4 py-2 text-right">Net Profit (Cr)</th>
                    <th class="px-4 py-2 text-right">OPM %</th>
                </tr>
            </thead>
            <tbody id="performers-table">
                <tr><td colspan="5" class="text-center py-4">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadTopPerformers() {
        try {
            // Use dashboard-stats or companies API to get top performers
            const response = await fetch('/api/companies/');
            const companies = await response.json();
            
            // For now, show all companies with placeholder ranks
            // In production, you'd sort by net_profit from FactProfitLoss
            const tbody = document.getElementById('performers-table');
            
            if (companies.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No data available</td></tr>';
                return;
            }
            
            // Show first 15 companies as sample
            const top15 = companies.slice(0, 15);
            tbody.innerHTML = top15.map((c, index) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-4 py-2 font-bold">${index + 1}</td>
                    <td class="px-4 py-2 font-mono">${c.symbol}</td>
                    <td class="px-4 py-2">
                        <a href="/company/${c.symbol}" class="text-blue-600 hover:underline">${c.company_name}</a>
                    </td>
                    <td class="px-4 py-2 text-right text-green-600">--</td>
                    <td class="px-4 py-2 text-right">--</td>
                </tr>
            `).join('');
        } catch (error) {
            document.getElementById('performers-table').innerHTML = '<tr><td colspan="5" class="text-center py-4 text-red-500">Error loading data</td></tr>';
        }
    }
    
    loadTopPerformers();
</script>
{% endblock %}
