{% extends 'base.html' %}

{% block title %}Sector Analysis - Nifty 100 Analytics{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Sector Analysis</h1>
    <p class="text-gray-600 mb-6">Performance across different sectors</p>
    
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-2 text-left">Sector</th>
                    <th class="px-4 py-2 text-right">Companies</th>
                </tr>
            </thead>
            <tbody id="sector-table">
                <tr><td colspan="2" class="text-center py-4">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    fetch('/api/sector-analysis/')
        .then(r => r.json())
        .then(data => {
            const sectors = data.sectors || [];
            const tableBody = document.getElementById('sector-table');
            if (sectors.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="2" class="text-center py-4">No sector data available</td></tr>';
                return;
            }
            tableBody.innerHTML = sectors.map(s => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-4 py-2 font-semibold">${s.sector}</td>
                    <td class="px-4 py-2 text-right">${s.companies}</td>
                </tr>
            `).join('');
        })
        .catch(error => {
            document.getElementById('sector-table').innerHTML = '<tr><td colspan="2" class="text-center py-4 text-red-500">Error loading data</td></tr>';
        });
</script>
{% endblock %}
